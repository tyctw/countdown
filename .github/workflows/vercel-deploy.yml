name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm run build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Check Vercel secrets
        id: vercel-secrets
        shell: bash
        run: |
          if [[ -n "$VERCEL_TOKEN" && -n "$VERCEL_ORG_ID" && -n "$VERCEL_PROJECT_ID" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Vercel secrets missing::Build succeeded, but deployment was skipped because VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID is not configured in GitHub Actions secrets."
            echo "Add these repository secrets in GitHub: Settings -> Secrets and variables -> Actions."
            echo "See DEPLOYMENT.md for setup steps."
          fi

      - name: Checkout
        if: steps.vercel-secrets.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.vercel-secrets.outputs.configured == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        if: steps.vercel-secrets.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel environment
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: pnpm dlx vercel@latest pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build with Vercel
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: pnpm dlx vercel@latest build --prod --token=$VERCEL_TOKEN

      - name: Deploy to Vercel
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: pnpm dlx vercel@latest deploy --prebuilt --prod --token=$VERCEL_TOKEN
